<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Science Center Events</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="glass-header">
        <div class="logo">スポーツ科学総合センター<span>Events</span></div>
        <nav>
            <a href="#" id="nav-home" class="active">ホーム</a>
            <a href="#" id="nav-calendar">カレンダー</a>
        </nav>
    </header>

    <main>
        <!-- Home View (Card Grid) -->
        <div id="view-home" class="view-section">
            <section class="hero">
                <h1>社内イベントポータル</h1>
                <p>イベント・研修の一覧です。</p>
                <div class="hero-actions">
                    <button class="primary-btn"
                        onclick="document.getElementById('nav-calendar').click()">スケジュールを確認</button>
                </div>
            </section>

            <section class="event-list" id="event-grid">
                <!-- Cards will be populated dynamically via JS -->
            </section>
        </div>

        <!-- Calendar View -->
        <div id="view-calendar" class="view-section" style="display: none;">
            <section class="gantt-header">
                <h2 id="calendar-title">月間スケジュール</h2>
                <p id="calendar-desc">現在予定されている社内イベントのスケジュール進行です。</p>
            </section>

            <div class="gantt-controls">
                <!-- Gantt navigation -->
                <div class="gantt-nav" id="gantt-nav">
                    <button id="gantt-prev" class="icon-btn">&lt; 前へ</button>
                    <span id="gantt-current-date-label">2026年 11月</span>
                    <button id="gantt-next" class="icon-btn">次へ &gt;</button>
                </div>
                <!-- Day navigation (hidden by default) -->
                <div class="gantt-nav" id="day-nav" style="display:none;">
                    <button id="day-prev" class="icon-btn">&lt; 前日</button>
                    <span id="day-date-label" style="min-width:180px; text-align:center;"></span>
                    <button id="day-next" class="icon-btn">次日 &gt;</button>
                    <button id="day-today" class="icon-btn"
                        style="border-left:1px solid rgba(255,255,255,0.15); padding-left:1rem; margin-left:0.5rem;">今日</button>
                    <button id="day-mode-toggle-btn" class="icon-btn day-mode-btn" title="表示切替">⇄ 横</button>
                </div>
                <div class="gantt-view-options">
                    <button class="view-btn" data-days="1">1日</button>
                    <button class="view-btn" data-days="7">1週間</button>
                    <button class="view-btn" data-days="14">2週間</button>
                    <button class="view-btn active" data-days="30">1ヶ月</button>
                    <div id="gantt-zoom-group" class="gantt-zoom-group">
                        <button id="gantt-zoom-out" class="icon-btn gantt-zoom-btn" title="縮小">−</button>
                        <button id="gantt-zoom-in"  class="icon-btn gantt-zoom-btn" title="拡大">＋</button>
                    </div>
                </div>
            </div>

            <!-- Gantt chart -->
            <section class="gantt-view-container" id="gantt-view-container">
                <div class="gantt-timeline-header" id="gantt-header-days"></div>
                <div id="gantt-tracks"></div>
            </section>

            <!-- 1日 timeline view -->
            <div id="day-view-container" style="display:none;">
                <!-- All-day events -->
                <div class="day-allday-section">
                    <div class="day-allday-label">終日</div>
                    <div class="day-allday-events" id="day-allday-events"></div>
                </div>
                <!-- 24h timeline (PC Grid) -->
                <div class="day-timeline-container hide-on-mobile" id="day-timeline-container">
                    <!-- Populated by JS -->
                </div>
                <!-- 24h timeline (Mobile List/Agenda) -->
                <div class="day-agenda-container hide-on-desktop" id="day-agenda-container">
                    <!-- Populated by JS -->
                </div>
                <!-- Horizontal resource timeline view -->
                <div id="day-horizontal-container" style="display:none;"></div>
            </div>
        </div>
    </main>

    <!-- ========== 詳細モーダル ========== -->
    <div id="detail-overlay" class="detail-overlay" style="display:none;">
        <div class="detail-modal">
            <button class="detail-close" onclick="closeDetail()">✕</button>
            <div id="detail-content"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
